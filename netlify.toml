[build]
  publish = "."
  command = "echo No build step"

# Pretty URLs (/location/ → location/index.html) — SEO friendly
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true

# Force HTTPS (Netlify default + explicit redirect)
[[redirects]]
  from = "http://hongdaeshirtroom.netlify.app/*"
  to = "https://hongdaeshirtroom.netlify.app/:splat"
  status = 301
  force = true

# Trailing-slash consistency (prefer slash URLs in sitemap)
[[redirects]]
  from = "/location"
  to = "/location/"
  status = 301
  force = true

[[redirects]]
  from = "/reserve"
  to = "/reserve/"
  status = 301
  force = true

[[redirects]]
  from = "/faq"
  to = "/faq/"
  status = 301
  force = true

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# ----- Security + SEO headers -----
[[headers]]
  for = "/*"
  [headers.values]
    # Do NOT use HSTS preload on *.netlify.app
    Strict-Transport-Security = "max-age=31536000"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    Cross-Origin-Opener-Policy = "same-origin"
    X-DNS-Prefetch-Control = "on"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; frame-src https://maps.google.com https://www.google.com; connect-src 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=UTF-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap.txt"
  [headers.values]
    Content-Type = "text/plain; charset=UTF-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=UTF-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
